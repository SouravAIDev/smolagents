# Docker Compose configuration for Book Finder Agent with PostgreSQL
# Usage: docker-compose up

version: '3.8'

services:
  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:0.4.4-pg15
    container_name: book_finder_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-bookfinder}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bookfinder123}
      POSTGRES_DB: ${DB_NAME:-book_finder_db}
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./agents/book_finder_agent/queries/create_chat_data_table.sql:/docker-entrypoint-initdb.d/01-create_tables.sql
    networks:
      - book_finder_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bookfinder}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for caching (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: book_finder_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - book_finder_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Book Finder Agent Application
  book_finder_agent:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - gcp_creds
    container_name: book_finder_agent
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      DATABASE_URI: postgresql://${DB_USER:-bookfinder}:${DB_PASSWORD:-bookfinder123}@postgres:5432/${DB_NAME:-book_finder_db}
      REDIS_URI: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-alan-suite}
      SEMANTIC_SIMILARITY_THRESHOLD: ${SEMANTIC_SIMILARITY_THRESHOLD:-0.65}
      CITATION_CONFIDENCE_THRESHOLD: ${CITATION_CONFIDENCE_THRESHOLD:-0.75}
      MAX_RESULTS_PER_QUERY: ${MAX_RESULTS_PER_QUERY:-25}
      PAGE_SIZE: ${PAGE_SIZE:-10}
      SESSION_EXPIRY_HOURS: ${SESSION_EXPIRY_HOURS:-24}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.0-flash}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2048}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${FLASK_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    networks:
      - book_finder_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  book_finder_network:
    driver: bridge

secrets:
  gcp_creds:
    file: ${GCP_CREDENTIALS_FILE:-./.gcp/credentials.json}
